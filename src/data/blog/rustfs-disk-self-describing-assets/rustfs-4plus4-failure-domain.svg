<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="820" viewBox="0 0 1800 820" role="img" aria-label="RustFS 4+4 failure domain">
  <defs>
    <marker id="arrow-head-0" viewBox="0 0 14 14" refX="12" refY="7" markerWidth="14" markerHeight="14" markerUnits="userSpaceOnUse" orient="auto-start-reverse">
      <path d="M 2 2 L 12 7 L 2 12 z" fill="#dc2626"/>
    </marker>
    <style>
      svg { background: #fbfbf7; }
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#fbfbf7"/>
  
  <g class="zone">
    <rect x="70" y="130" width="1660" height="600" rx="10" fill="#e5e7eb" stroke="#6b7280" stroke-width="2" opacity="0.45"/>
    <text x="94" y="168" text-anchor="start" font-size="25" font-weight="700" fill="#111827"><tspan x="94" dy="0">One 8-disk set in this lab</tspan></text>
  </g>
<g class="arrow">
    <path d="M 295 438 L 295 500 L 760 500 L 876.5666607083688 539.8269424086926" fill="none" stroke="#dc2626" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow-head-0)"/>
  </g>
<g class="node">
    <rect x="130" y="250" width="330" height="180" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="295" y="324.5" text-anchor="middle" font-size="25" font-weight="650" fill="#111827"><tspan x="295" dy="0">node1</tspan><tspan x="295" dy="31">D1 lost / D2 lost</tspan></text>
  </g>
<g class="node">
    <rect x="530" y="250" width="330" height="180" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
    <text x="695" y="324.5" text-anchor="middle" font-size="25" font-weight="650" fill="#0f172a"><tspan x="695" dy="0">node2</tspan><tspan x="695" dy="31">D3 / D4</tspan></text>
  </g>
<g class="node">
    <rect x="930" y="250" width="330" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="1095" y="324.5" text-anchor="middle" font-size="25" font-weight="650" fill="#0f172a"><tspan x="1095" dy="0">node3</tspan><tspan x="1095" dy="31">P1 / P2</tspan></text>
  </g>
<g class="node">
    <rect x="1330" y="250" width="330" height="180" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="1495" y="324.5" text-anchor="middle" font-size="25" font-weight="650" fill="#0f172a"><tspan x="1495" dy="0">node4</tspan><tspan x="1495" dy="31">P3 / P4</tspan></text>
  </g>
<g class="node">
    <rect x="150" y="560" width="470" height="90" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
    <text x="385" y="605" text-anchor="middle" font-size="25" font-weight="650" fill="#0f172a"><tspan x="385" dy="0">usable = 4 / (4 + 4) = 50%</tspan></text>
  </g>
<g class="node">
    <rect x="760" y="545" width="600" height="115" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="3"/>
    <text x="1060" y="587" text-anchor="middle" font-size="25" font-weight="650" fill="#111827"><tspan x="1060" dy="0">set-level tolerance</tspan><tspan x="1060" dy="31">counts missing shards</tspan></text>
  </g>
<g class="arrow-overlay">
    <circle cx="295" cy="500" r="19" fill="#dc2626" stroke="#ffffff" stroke-width="4"/><text x="295" y="507" text-anchor="middle" font-size="21" font-weight="800" fill="#ffffff">1</text>
    <rect x="410" y="451" width="330" height="38" rx="5" fill="#fbfbf7" stroke="none" opacity="0.94"/><text x="575" y="470" text-anchor="middle" font-size="19" font-weight="650" fill="#1f2937"><tspan x="575" dy="0">node1 failure removes 2 shards</tspan></text>
  </g>
<g class="legend">
    <g>
        <rect x="70" y="55" width="28" height="18" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
        <text x="110" y="71" font-size="18" font-weight="600" fill="#334155">lost shard / failure</text>
      </g><g>
        <rect x="384" y="55" width="28" height="18" rx="4" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
        <text x="424" y="71" font-size="18" font-weight="600" fill="#334155">data shard</text>
      </g><g>
        <rect x="568" y="55" width="28" height="18" rx="4" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
        <text x="608" y="71" font-size="18" font-weight="600" fill="#334155">parity shard</text>
      </g>
  </g>
</svg>
